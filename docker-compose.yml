services:
  # ── Redis (short-term memory store) ──────────────
  redis:
    image: redis:7-alpine
    container_name: telegram-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telegram-bot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override REDIS_URL to point to the Redis container
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Persist ChromaDB data across restarts
      - chroma_data:/app/chroma_data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
